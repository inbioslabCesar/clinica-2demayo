name: Deploy a Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-hostinger-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Build frontend (sistema + landing)
        run: npm run build

      - name: Publicar backend PHP en /public_html/sistema (SFTP)
        uses: wlixcc/sftp-action@v1.2.0
        with:
          host: ${{ secrets.HOSTINGER_SFTP_HOST }}
          port: ${{ secrets.HOSTINGER_SFTP_PORT }}
          username: ${{ secrets.HOSTINGER_FTP_USER }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          local_path: './*'
          remote_path: '/public_html/sistema/'
          delete: false

      - name: Publicar build de sistema (dist -> /public_html/sistema)
        uses: wlixcc/sftp-action@v1.2.0
        with:
          host: ${{ secrets.HOSTINGER_SFTP_HOST }}
          port: ${{ secrets.HOSTINGER_SFTP_PORT }}
          username: ${{ secrets.HOSTINGER_FTP_USER }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          local_path: './dist/'
          remote_path: '/public_html/sistema/'
          delete: false

      - name: Publicar landing (dist-public -> /public_html)
        uses: wlixcc/sftp-action@v1.2.0
        with:
          host: ${{ secrets.HOSTINGER_SFTP_HOST }}
          port: ${{ secrets.HOSTINGER_SFTP_PORT }}
          username: ${{ secrets.HOSTINGER_FTP_USER }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          local_path: './dist-public/'
          remote_path: '/public_html/'
          delete: false

